<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastro - API Laravel JWT">
    <title>Cadastrar — JWT API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-icon">🔐</span> JWT API
            </a>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="glass-card-static">
                <h1 class="auth-title">Criar Conta</h1>
                <p class="auth-subtitle">Preencha os dados para se cadastrar no sistema</p>

                <!-- Alert -->
                <div id="register-alert" class="alert-custom mb-3">
                    <i class="bi bi-exclamation-circle"></i>
                    <span id="register-alert-text"></span>
                </div>

                <form id="register-form" novalidate>
                    <div class="mb-3">
                        <label for="register-name" class="form-label">
                            <i class="bi bi-person me-1"></i>Nome
                        </label>
                        <input type="text" class="form-control" id="register-name"
                               placeholder="Seu nome completo" required maxlength="255" autocomplete="name">
                    </div>
                    <div class="mb-3">
                        <label for="register-email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>E-mail
                        </label>
                        <input type="email" class="form-control" id="register-email"
                               placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <label for="register-password" class="form-label">
                            <i class="bi bi-key me-1"></i>Senha
                        </label>
                        <input type="password" class="form-control" id="register-password"
                               placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                    </div>
                    <div class="mb-3">
                        <label for="register-password-confirm" class="form-label">
                            <i class="bi bi-key-fill me-1"></i>Confirmar Senha
                        </label>
                        <input type="password" class="form-control" id="register-password-confirm"
                               placeholder="Repita a senha" required minlength="8" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-accent w-100 mt-2" id="register-btn">
                        <span id="register-btn-text">
                            <i class="bi bi-person-plus me-2"></i>Cadastrar
                        </span>
                        <span id="register-btn-loading" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>Cadastrando...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    Já tem conta? <a href="login.html">Entrar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
                return;
            }
            App.initRegisterPage();
        });
    </script>
</body>
</html>
