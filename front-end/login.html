<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - API Laravel JWT">
    <title>Entrar — JWT API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-icon">🔐</span> JWT API
            </a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="glass-card-static">
                <h1 class="auth-title">Bem-vindo de volta</h1>
                <p class="auth-subtitle">Entre com suas credenciais para acessar o sistema</p>

                <!-- Alert -->
                <div id="login-alert" class="alert-custom mb-3">
                    <i class="bi bi-exclamation-circle"></i>
                    <span id="login-alert-text"></span>
                </div>

                <form id="login-form" novalidate>
                    <div class="mb-3">
                        <label for="login-email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>E-mail
                        </label>
                        <input type="email" class="form-control" id="login-email"
                               placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">
                            <i class="bi bi-key me-1"></i>Senha
                        </label>
                        <input type="password" class="form-control" id="login-password"
                               placeholder="Sua senha" required autocomplete="current-password" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-accent w-100 mt-2" id="login-btn">
                        <span id="login-btn-text">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </span>
                        <span id="login-btn-loading" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>Entrando...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    Não tem conta? <a href="register.html">Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already authenticated
            if (Auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
                return;
            }
            App.initLoginPage();
        });
    </script>
</body>
</html>
